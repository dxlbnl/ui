<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — Inbox" subtitle="Bell + unread badge + notification list popover" viewport="700x440" -->
<html lang="en" data-palette="phosphor">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  body { padding: 24px; }
  .label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 16px; }
  .bar { display: flex; justify-content: flex-end; padding-right: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../ui_kits/components/base.jsx"></script>
<script type="text/babel" src="../ui_kits/components/Popover.jsx"></script>
<script type="text/babel" src="../ui_kits/components/Inbox.jsx"></script>
<script type="text/babel">
const INIT = [
  { id: 1, tone: "amber", title: "Load alert", body: "+12V rail hit 88% during boot self-test.", time: "14:22", unread: true },
  { id: 2, tone: "danger", title: "Thermal fault", body: "PDX-2 exceeded 60°C — auto-shutdown armed.", time: "13:55", unread: true },
  { id: 3, tone: "ok", title: "Order shipped", body: "DXL-0044 · Distrans AR-1 left the bench.", time: "11:08", unread: false },
  { id: 4, tone: "cyan", title: "Firmware synced", body: "v2.2.0 pushed to all connected modules.", time: "09:30", unread: false },
];
function Demo() {
  const [items, setItems] = React.useState(INIT);
  return (
    <React.Fragment>
      <div className="label">// inbox — unread badge; click bell to open</div>
      <div className="bar">
        <Inbox items={items} onOpen={(n) => setItems(xs => xs.map(x => x.id === n.id ? { ...x, unread: false } : x))} onMarkAll={() => setItems(xs => xs.map(x => ({ ...x, unread: false })))} />
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

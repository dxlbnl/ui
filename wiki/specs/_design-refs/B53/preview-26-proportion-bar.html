<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — Proportion Bar" subtitle="Stacked share bar + legend; caller maps colors" viewport="700x240" -->
<html lang="en" data-palette="phosphor">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  body { padding: 24px; }
  .label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 20px; }
  .wrap { max-width: 560px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../ui_kits/components/ProportionBar.jsx"></script>
<script type="text/babel">
function Demo() {
  return (
    <React.Fragment>
      <div className="label">// proportion bar — stacked share + legend</div>
      <div className="wrap">
        <ProportionBar segments={[
          { label: "Power", value: 42, color: "var(--amber)", valueLabel: "42%" },
          { label: "Logic", value: 28, color: "var(--cyan)", valueLabel: "28%" },
          { label: "I/O", value: 18, color: "var(--ok)", valueLabel: "18%" },
          { label: "Spare", value: 12, color: "var(--rule-strong)", valueLabel: "12%" },
        ]} />
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

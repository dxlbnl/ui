<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — Segmented Control" subtitle="Row of joined buttons, one active; sizes sm / md" viewport="700x200" -->
<html lang="en" data-palette="phosphor">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  body { padding: 22px; display: flex; flex-direction: column; gap: 22px; }
  .label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../ui_kits/components/SegmentedControl.jsx"></script>
<script type="text/babel">
function Demo() {
  const [period, setPeriod] = React.useState("month");
  const [view, setView] = React.useState("list");
  return (
    <React.Fragment>
      <div>
        <div className="label">// size md — string options</div>
        <SegmentedControl value={period} onChange={setPeriod} options={["week", "month", "year"]} />
      </div>
      <div>
        <div className="label">// size sm — {`{value,label}`} options</div>
        <SegmentedControl value={view} onChange={setView} size="sm" options={[{ value: "list", label: "List" }, { value: "grid", label: "Grid" }, { value: "chart", label: "Chart" }]} />
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

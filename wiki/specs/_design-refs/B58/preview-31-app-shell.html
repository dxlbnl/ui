<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — App Shell" subtitle="Responsive frame: sidebar rail (desktop) → bottom tabs (mobile)" viewport="940x600" -->
<html lang="en" data-palette="phosphor">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  html, body { height: 100%; }
  body { padding: 0; margin: 0; }
</style>
</head>
<body>
<div id="root" style="height:100%"></div>
<script type="text/babel" src="../ui_kits/components/base.jsx"></script>
<script type="text/babel" src="../ui_kits/components/AppShell.jsx"></script>
<script type="text/babel">
const NAV = [
  { id: "home", label: "Home" },
  { id: "rails", label: "Rails", badge: 3 },
  { id: "orders", label: "Orders" },
  { id: "you", label: "You" },
];
function Demo() {
  const [cur, setCur] = React.useState("rails");
  const brand = (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <Led tone="ok" />
      <span style={{ fontFamily: "var(--mono)", fontWeight: 700, fontSize: 13, letterSpacing: "0.12em", textTransform: "uppercase" }}>DEXTERLABS</span>
    </div>
  );
  return (
    <AppShell
      brand={brand}
      nav={NAV}
      current={cur}
      onNavigate={setCur}
      topLeft={<span style={{ fontFamily: "var(--mono)", fontSize: 12, letterSpacing: ".1em", textTransform: "uppercase", color: "var(--ink-dim)" }}>// {cur}</span>}
      topRight={<span style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--ink-faint)" }}>v3.0</span>}
      footer={<span style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".06em", textTransform: "uppercase", color: "var(--ink-faint)" }}>Est. 2019 · Delft</span>}
    >
      <div style={{ padding: 28 }}>
        <div style={{ fontFamily: "var(--mono)", fontSize: 11, letterSpacing: ".12em", textTransform: "uppercase", color: "var(--ink-faint)", marginBottom: 8 }}>// {cur}</div>
        <h1 style={{ fontWeight: 500, fontSize: "var(--t-h2)", letterSpacing: "-0.01em" }}>Resize me</h1>
        <p style={{ marginTop: 12, color: "var(--ink-dim)", maxWidth: "52ch", lineHeight: 1.6 }}>Below 760px this frame swaps the sidebar rail for a bottom tab bar. The rail badge becomes a tab dot.</p>
      </div>
    </AppShell>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>

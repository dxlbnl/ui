<!DOCTYPE html>
<!-- @dsCard group="Components" name="Components — Status Pill" subtitle="Led + label that opens a detail Popover" viewport="700x340" -->
<html lang="en" data-palette="phosphor">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
  body { padding: 24px; }
  .label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 20px; }
  .row { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .kv { display: flex; justify-content: space-between; gap: 16px; font-family: var(--mono); font-size: 11px; padding: 5px 0; border-bottom: 1px dashed var(--rule); }
  .kv:last-child { border-bottom: none; }
  .kv .k { color: var(--ink-faint); text-transform: uppercase; letter-spacing: .06em; }
  .kv .v { color: var(--ink); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../ui_kits/components/base.jsx"></script>
<script type="text/babel" src="../ui_kits/components/Popover.jsx"></script>
<script type="text/babel" src="../ui_kits/components/StatusPill.jsx"></script>
<script type="text/babel">
function Demo() {
  const detail = (
    <div style={{ padding: "12px 14px" }}>
      <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: ".12em", textTransform: "uppercase", color: "var(--ink-faint)", marginBottom: 8 }}>// rail detail</div>
      <div className="kv"><span className="k">+12V</span><span className="v" style={{ color: "var(--ok)" }}>2.04A</span></div>
      <div className="kv"><span className="k">−12V</span><span className="v">0.63A</span></div>
      <div className="kv"><span className="k">Temp</span><span className="v" style={{ color: "var(--amber)" }}>48°C</span></div>
    </div>
  );
  return (
    <React.Fragment>
      <div className="label">// status pill — click to open detail popover</div>
      <div className="row">
        <StatusPill tone="ok" label="All systems" detail="nominal">{detail}</StatusPill>
        <StatusPill tone="amber" label="Load high" detail="88%" blink>{detail}</StatusPill>
        <StatusPill tone="danger" label="Fault" detail="rail −12V">{detail}</StatusPill>
        <StatusPill tone="cyan" label="Sync" detail="t.04" />
      </div>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
